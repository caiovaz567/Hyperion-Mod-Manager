<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0A0A0A" />
    <!-- Fonts are self-hosted (@fontsource imports in main.tsx), so the CSP allows no
         external font/style hosts and a cold start never waits on the network. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: hyperion-local:;" />
    <title>Hyperion</title>
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0A0A0A;
        color: #F2F2F2;
      }
    </style>
  </head>
  <body style="background:#0A0A0A;color:#F2F2F2;">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
