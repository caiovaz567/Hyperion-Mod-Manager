name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json | Out-String | ConvertFrom-Json
          $version = $package.version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Check if release tag exists
        id: tag_check
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $tag = "v$version"
          git fetch --tags
          if (git tag -l $tag) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create release tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $tag = "v$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag

      - name: Extract changelog for this version
        id: changelog
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw -Encoding utf8
          $pattern = "(?s)## \[$([regex]::Escape($version))\].*?(?=\n---|\n## \[|$)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
            $notes = $match.Value.Trim()
          } else {
            $notes = "See CHANGELOG.md for details."
          }
          $delimiter = "CHANGELOG_EOF"
          "notes<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        run: npm run dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          fail_on_unmatched_files: true
          files: |
            dist/Hyperion-${{ steps.version.outputs.version }}.exe
            dist/Hyperion-${{ steps.version.outputs.version }}.exe.blockmap
            dist/latest.yml

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Hyperion-${{ steps.version.outputs.version }}
          path: dist/*.exe
          if-no-files-found: error

