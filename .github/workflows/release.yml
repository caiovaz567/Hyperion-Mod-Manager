name: Release

# Releases are cut ONLY by pushing a version tag (vX.Y.Z). Triggering on every
# push to main rebuilt and re-published the current version's release assets on
# unrelated commits (docs pushes, fixes without a release intent) — and since
# action-gh-release creates missing tags, a version bump pushed to main could
# mint a release by itself. The checkout below builds exactly the tagged commit.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    # Pinned to windows-2022 (Visual Studio 2022 / v17): node-gyp 10.x cannot
    # detect the Visual Studio 18 that ships on the newer windows-latest image,
    # which breaks the native usvfs-bridge compile.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json | Out-String | ConvertFrom-Json
          $version = $package.version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Extract changelog for this version
        id: changelog
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw -Encoding utf8
          $pattern = "(?s)## \[$([regex]::Escape($version))\].*?(?=\n---|\n## \[|$)"
          $match = [regex]::Match($content, $pattern)
          if ($match.Success) {
            $notes = $match.Value.Trim()
          } else {
            $notes = "See CHANGELOG.md for details."
          }
          $delimiter = "CHANGELOG_EOF"
          "notes<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $delimiter | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Fetch usvfs SDK
        run: npm run fetch:usvfs

      - name: Build installer
        run: npm run build

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          fail_on_unmatched_files: true
          files: |
            dist/Hyperion-${{ steps.version.outputs.version }}.exe
            dist/Hyperion-${{ steps.version.outputs.version }}.exe.blockmap
            dist/latest.yml

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Hyperion-${{ steps.version.outputs.version }}
          path: dist/*.exe
          if-no-files-found: error

