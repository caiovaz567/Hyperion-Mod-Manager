name: Tests

# Runs the vitest unit suite (deploy paths, mod-type detection, capture cleanup,
# FOMOD parsing, conflict math, nxm/update lineage) on every push and PR. The
# suite stubs Electron, so no native build or display is needed.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts: skips the Electron binary download and git-hook setup;
      # the unit suite needs neither.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck (app + tests)
        run: npx tsc --noEmit -p tests/tsconfig.json

      - name: Run unit tests
        run: npx vitest run
